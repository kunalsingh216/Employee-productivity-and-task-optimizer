# Server Configuration
server.port=8080
spring.application.name=employee-productivity-tool

# SQLite Database Configuration
spring.datasource.url=jdbc:sqlite:productivity_tool.db
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.datasource.username=
spring.datasource.password=

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# CORS Configuration (handled in code)
# Static Resources
spring.web.resources.static-locations=classpath:/static/,file:./

# Logging
logging.level.com.example.productivity=INFO
logging.level.org.springframework.web=INFO
spring.jpa.properties.hibernate.jdbc.use_get_generated_keys=false
spring.jpa.hibernate.use-new-id-generator-mappings=false
server.servlet.context-path=/


